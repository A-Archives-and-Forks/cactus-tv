name = "cactus-streamflow"
main = "src/index.ts"
compatibility_date = "2026-07-01"

[vars]
STREAMFLOW_MAX_HEIGHT = "1080"
STREAMFLOW_MAX_BYTES = "996147200"
STREAMFLOW_BATCH_OBJECTS = "7"
STREAMFLOW_TOTAL_MAX_BYTES = "5000000000"
# 如果数据源只配置在 Pages 的 PROVIDERS_JSON 中，也要把同一份 JSON 配到此 Worker。
# PROVIDERS_JSON = "[...]"

[[d1_databases]]
binding = "DB"
database_name = "cactus-tv-db"
database_id = "替换为你的 D1 database_id"

[[r2_buckets]]
binding = "STREAMFLOW_R2"
bucket_name = "cactus-streamflow-cache"

[[queues.producers]]
binding = "STREAMFLOW_QUEUE"
queue = "cactus-streamflow-jobs"

[[queues.consumers]]
queue = "cactus-streamflow-jobs"
max_batch_size = 1
max_batch_timeout = 2
max_retries = 5
max_concurrency = 1
